services:

  traefik:
    image: traefik:v3.7.5
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - proxy
    restart: unless-stopped

  pihole:
    container_name: pihole
    image: pihole/pihole:2026.05.0
    user: "0"
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 67:67/udp
    environment:
      - TZ=Netherlands/Amsterdam
      - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD}
      - FTLCONF_dns_upstreams=1.1.1.1;1.0.0.1
    volumes:
      - /home/tim/pihole/etc-pihole/:/etc/pihole/
      - /home/tim/pihole/etc-dnsmasq.d/:/etc/dnsmasq.d/
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`${PIHOLE_HOST}`)"
      - "traefik.http.routers.pihole.entrypoints=web"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "traefik.http.middlewares.pihole-redirect.redirectregex.regex=^http://([^/]+)/?$$"
      - "traefik.http.middlewares.pihole-redirect.redirectregex.replacement=http://$${1}/admin"
      - "traefik.http.middlewares.pihole-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.pihole.middlewares=pihole-redirect"
    restart: unless-stopped

  fail2ban:
    image: crazymax/fail2ban:1.1.0
    container_name: fail2ban
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    environment:
      - TZ=Netherlands/Amsterdam
    volumes:
      - /home/tim/fail2ban/config:/data
      - /var/log:/var/log:ro
    restart: unless-stopped

  fail2ban-ui:
    image: swissmakers/fail2ban-ui:latest
    container_name: fail2ban-ui
    environment:
      - TZ=Netherlands/Amsterdam
      - FAIL2BAN_SOCKET=/data/run/fail2ban.sock
    volumes:
      - /home/tim/fail2ban/config:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fail2ban-ui.rule=Host(`${FAIL2BAN_HOST}`)"
      - "traefik.http.routers.fail2ban-ui.entrypoints=web"
      - "traefik.http.services.fail2ban-ui.loadbalancer.server.port=8080"
    restart: unless-stopped

  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:v0.11.2
    container_name: nebula-sync
    environment:
      - PRIMARY=${PRIMARY}
      - REPLICAS=${REPLICAS}
      - FULL_SYNC=true
      - RUN_GRAVITY=false
      - CRON=0 * * * *
    restart: unless-stopped

networks:
  proxy:
    driver: bridge
